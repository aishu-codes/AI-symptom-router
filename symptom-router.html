<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Symptom Router</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans antialiased p-6">

    <main class="max-w-md mx-auto bg-white shadow-xl rounded-2xl p-6 mt-12 border border-slate-100">
        <!-- Header -->
        <div class="text-center mb-6">
            <span class="text-4xl">🤖</span>
            <h1 class="text-2xl font-bold text-indigo-600 mt-2">AI Symptom Router</h1>
            <p class="text-slate-500 text-xs mt-1">Type your symptoms to find the right medical specialist.</p>
        </div>

        <!-- Input Area -->
        <div class="space-y-4">
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="text-xs font-bold text-slate-600 uppercase">How do you feel?</label>
                    <button onclick="loadSymptomSample()" class="text-xs text-indigo-500 hover:underline cursor-pointer">📋 Load Sample</button>
                </div>
                <textarea id="symptomInput" rows="4" placeholder="Example: My chest hurts when I breathe and I feel dizzy..." 
                    class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:border-indigo-500 bg-slate-50 font-medium"></textarea>
            </div>

            <button id="routeBtn" onclick="analyzeSymptoms()" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition cursor-pointer shadow-md">
                🔍 Find Right Doctor
            </button>
        </div>

        <!-- Loading State -->
        <div id="loading" class="hidden text-center py-8 space-y-2">
            <div class="w-6 h-6 border-3 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="text-xs text-slate-500 font-medium">AI is analyzing symptoms...</p>
        </div>

        <!-- Output Dashboard -->
        <div id="resultDashboard" class="hidden mt-6 border-t border-slate-100 pt-4 space-y-4">
            <div id="priorityBadge" class="px-3 py-1.5 rounded-lg text-xs font-bold text-center uppercase tracking-wider"></div>
            
            <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100/50">
                <h4 class="text-xs font-bold text-indigo-500 uppercase">Recommended Specialist</h4>
                <p id="doctorType" class="text-lg font-bold text-slate-900 mt-1"></p>
            </div>

            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                <h4 class="text-xs font-bold text-slate-500 uppercase">AI Explanation</h4>
                <p id="aiReason" class="text-xs text-slate-600 leading-relaxed mt-1"></p>
            </div>
        </div>
    </main>

    <script>
        function loadSymptomSample() {
            document.getElementById('symptomInput').value = "I have a severe skin rash on my left arm that is red and keeps itching like crazy.";
        }

        function analyzeSymptoms() {
            const input = document.getElementById('symptomInput').value.trim();
            if (!input) return alert("Please enter your symptoms!");

            // UI Changes
            document.getElementById('resultDashboard').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            setTimeout(() => {
                // Mocking AI API response
                const mockApiResponse = {
                    priority: "Routine", // Urgent or Routine
                    specialist: "Dermatologist (Skin Specialist)",
                    reason: "The patient describes a localized skin rash with severe redness and itching. This matches conditions treated by a skin specialist. No emergency breathing or heart issues are noted."
                };

                // Render Data to DOM
                document.getElementById('doctorType').innerText = mockApiResponse.specialist;
                document.getElementById('aiReason').innerText = mockApiResponse.reason;

                const badge = document.getElementById('priorityBadge');
                if(mockApiResponse.priority === "Urgent") {
                    badge.innerText = "🚨 Priority: Urgent Care Required";
                    badge.className = "px-3 py-1.5 rounded-lg text-xs font-bold text-center uppercase tracking-wider bg-rose-100 text-rose-700 border border-rose-200";
                } else {
                    badge.innerText = "📅 Priority: Routine Checkup";
                    badge.className = "px-3 py-1.5 rounded-lg text-xs font-bold text-center uppercase tracking-wider bg-emerald-100 text-emerald-700 border border-emerald-200";
                }

                // Show Result
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('resultDashboard').classList.remove('hidden');
            }, 1200);
        }
    </script>
</body>
</html>
